<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cards</title>

<style>
  .container {
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
  }

  .card {
    flex: 1;
    min-width: 150px;
    background: white;
    padding: 20px;
    border: 1px solid #ccc;
  }
</style>
</head>

<body>

<div class="container">
  <div class="card">Card 1</div>
  <div class="card">Card 2</div>
  <div class="card">Card 3</div>
  <div class="card">Card 4</div>
</div>

</body>
</html>

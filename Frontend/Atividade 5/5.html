<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cards Responsivos</title>

<style>
  .cards {
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
  }

  .card {
    flex: 1;
    min-width: 200px;
    background: white;
    padding: 20px;
    border: 1px solid #ccc;
  }

  body {
    font-family: Arial;
    background: #f4f4f4;
    padding: 20px;
  }
</style>
</head>

<body>

<div class="cards">
  <div class="card">Aviso 1</div>
  <div class="card">Aviso 2</div>
  <div class="card">Aviso 3</div>
  <div class="card">Aviso 4</div>
</div>

</body>
</html>

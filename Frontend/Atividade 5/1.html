<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Menu Flexbox</title>

<style>
  .menu {
    display: flex;
    justify-content: center;
    gap: 20px;
    background: #333;
    padding: 15px;
  }

  .menu a {
    color: white;
    text-decoration: none;
  }
</style>
</head>

<body>

<div class="menu">
  <a href="#">Início</a>
  <a href="#">Avisos</a>
  <a href="#">Tarefas</a>
</div>

</body>
</html>

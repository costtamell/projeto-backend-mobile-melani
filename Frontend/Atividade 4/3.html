<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cadastro</title>

  <style>
    body {
      font-family: Arial;
      background-color: #f2f2f2;
    }

    .formulario {
      width: 300px;
      margin: 50px auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    input {
      width: 100%;
      padding: 8px;
      margin-top: 10px;
      margin-bottom: 10px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 10px;
      background: green;
      color: white;
      border: none;
    }
  </style>
</head>

<body>

<div class="formulario">

<h2>Cadastro de Aluno</h2>

<input type="text" placeholder="Nome">

<input type="email" placeholder="E-mail">

<input type="text" placeholder="Curso">

<button>Cadastrar</button>

</div>

</body>
</html>

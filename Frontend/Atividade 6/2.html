<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Tabela de Presença</title>
  <style>
    table {
      width: 100%;
      border-collapse: collapse;
      font-family: Arial;
    }

    th, td {
      border: 1px solid black;
      padding: 10px;
      text-align: center;
    }

    th {
      background-color: #2b6cb0;
      color: white;
    }
  </style>
</head>
<body>

  <h2>Controle de Presença</h2>

  <table>
    <tr>
      <th>Nome</th>
      <th>Turma</th>
      <th>Status</th>
    </tr>
    <tr>
      <td>Maria</td>
      <td>3º A</td>
      <td>Presente</td>
    </tr>
    <tr>
      <td>João</td>
      <td>3º B</td>
      <td>Ausente</td>
    </tr>
    <tr>
      <td>Ana</td>
      <td>2º A</td>
      <td>Presente</td>
    </tr>
  </table>

</body>
</html>

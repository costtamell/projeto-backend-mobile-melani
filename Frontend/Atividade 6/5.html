<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Painel</title>
  <style>
    body {
      font-family: Arial;
      background-color: #f4f4f4;
      padding: 20px;
    }

    .card {
      background-color: white;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 8px;
      box-shadow: 0 0 5px gray;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background-color: white;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: center;
    }

    th {
      background-color: #2b6cb0;
      color: white;
    }
  </style>
</head>
<body>

  <h1>Painel da Escola</h1>

  <div class="card">
    <h2>Total de Alunos</h2>
    <p>350 alunos cadastrados.</p>
  </div>

  <div class="card">
    <h2>Eventos da Semana</h2>
    <p>3 eventos programados.</p>
  </div>

  <h2>Últimos Registros</h2>

  <table>
    <tr>
      <th>ID</th>
      <th>Evento</th>
      <th>Status</th>
    </tr>
    <tr>
      <td>1</td>
      <td>Reunião de Pais</td>
      <td>Confirmado</td>
    </tr>
    <tr>
      <td>2</td>
      <td>Feira de Ciências</td>
      <td>Pendente</td>
    </tr>
  </table>

</body>
</html>
